<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men | Arome</title>

    <!-- CSS & Fonts -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600&family=Cormorant+Garamond:wght=400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div id="navbar"></div>

<main class="products-page">
    <h1 class="page-title">Men's Collection</h1>
    <div class="products">
        <!-- Dior Sauvage -->
        <div class="product-card">
            <span class="glass-tag men">Men</span>
            <button class="wishlist-btn" data-tooltip="Add to Wishlist">
                <i class="fa-regular fa-heart"></i>
            </button>
            <img src="images/products/perfume1.jpeg" alt="Dior Sauvage">
            <h3>Dior Sauvage</h3>
            <p class="brand">Dior</p>
            <p class="description">Fresh woody fragrance with bergamot notes.</p>
            <p class="price">$120</p>
            <a href="sauvage.html" class="btn">View Details</a>
        </div>

        <!-- Creed Aventus -->
        <div class="product-card">
            <span class="glass-tag men">Men</span>
            <button class="wishlist-btn" data-tooltip="Add to Wishlist">
                <i class="fa-regular fa-heart"></i>
            </button>
            <img src="images/products/perfume3.jpeg" alt="Creed Aventus">
            <h3>Creed Aventus</h3>
            <p class="brand">Creed</p>
            <p class="description">Luxury fruity woody fragrance.</p>
            <p class="price">$350</p>
            <a href="aventus.html" class="btn">View Details</a>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/script.js"></script>
</body>
</html>
