<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women | Arome</title>

    <!-- CSS & Fonts -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600&family=Cormorant+Garamond:wght=400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div id="navbar"></div>

<main class="products-page">
    <h1 class="page-title">Women's Collection</h1>
    <div class="products">
        <!-- Libre -->
        <div class="product-card">
            <span class="glass-tag women">Women</span>
            <button class="wishlist-btn" data-tooltip="Add to Wishlist">
                <i class="fa-regular fa-heart"></i>
            </button>
            <img src="images/products/perfume2.jpeg" alt="Libre">
            <h3>Libre</h3>
            <p class="brand">YSL</p>
            <p class="description">Elegant floral fragrance.</p>
            <p class="price">$145</p>
            <a href="libre.html" class="btn">View Details</a>
        </div>

        <!-- Coco Chanel -->
        <div class="product-card">
            <span class="glass-tag women">Women</span>
            <button class="wishlist-btn" data-tooltip="Add to Wishlist">
                <i class="fa-regular fa-heart"></i>
            </button>
            <img src="images/products/perfume4.jpeg" alt="Coco Chanel">
            <h3>Coco Chanel</h3>
            <p class="brand">Chanel</p>
            <p class="description">Timeless elegant floral fragrance.</p>
            <p class="price">$170</p>
            <a href="coco.html" class="btn">View Details</a>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/script.js"></script>
</body>
</html>
